<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-gradient-start: #1a1a1a;
  --bg-gradient-mid: #2a2520;
  --bg-gradient-end: #1c1917;
  --card-bg: rgba(255, 255, 255, 0.05);
  --card-border: rgba(255, 255, 255, 0.09);
  --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  --text-primary: #ede9e3;
  --text-secondary: rgba(237, 233, 227, 0.55);
  --accent: #e8a849;
  --accent-hover: #d4952f;
  --accent-glow: rgba(232, 168, 73, 0.25);
  --input-bg: rgba(255, 255, 255, 0.06);
  --input-border: rgba(255, 255, 255, 0.1);
  --input-focus-border: #e8a849;
  --error-bg: rgba(220, 80, 70, 0.15);
  --error-text: #f0a8a3;
  --info-bg: rgba(232, 168, 73, 0.12);
  --info-text: #f0d6a4;
  --btn-secondary-bg: rgba(255, 255, 255, 0.07);
  --btn-secondary-hover: rgba(255, 255, 255, 0.12);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -120px;
  right: -100px;
  pointer-events: none;
  animation: float 8s ease-in-out infinite;
}

body::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
  bottom: -80px;
  left: -60px;
  pointer-events: none;
  animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  box-shadow: var(--card-shadow);
  padding: 2.75rem 2.25rem 2.25rem;
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
  animation: fadeInUp .6s ease-out;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .6rem;
  margin-bottom: 2rem;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px var(--accent-glow);
}

.logo-icon svg { width: 20px; height: 20px; fill: #fff; }

h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

label {
  display: block;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: .4rem;
  text-transform: uppercase;
  letter-spacing: .06em;
}

input {
  width: 100%;
  padding: .75rem 1rem;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 10px;
  font-size: .95rem;
  font-family: inherit;
  color: var(--text-primary);
  margin-bottom: 1.25rem;
  transition: border-color .25s, box-shadow .25s;
}

input::placeholder { color: var(--text-secondary); }
input:focus {
  outline: none;
  border-color: var(--input-focus-border);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.btn-group { display: flex; gap: .6rem; margin-top: .25rem; }

button {
  flex: 1;
  padding: .75rem;
  border: none;
  border-radius: 10px;
  font-size: .9rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .2s, box-shadow .2s, transform .15s, opacity .2s;
}

button:active:not(:disabled) { transform: scale(.97); }
button:disabled { opacity: .5; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-secondary {
  background: var(--btn-secondary-bg);
  color: var(--text-primary);
  border: 1px solid var(--card-border);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--btn-secondary-hover);
}

.msg {
  margin-top: 1.25rem;
  padding: .7rem 1rem;
  border-radius: 10px;
  font-size: .84rem;
  line-height: 1.4;
  display: none;
}
.msg.error { background: var(--error-bg); color: var(--error-text); }
.msg.info  { background: var(--info-bg);  color: var(--info-text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
    </div>
    <h1 data-i18n="title"></h1>
  </div>
  <form id="form">
    <label for="username" data-i18n="username"></label>
    <input id="username" type="text" autocomplete="username" required>
    <label for="password" data-i18n="password"></label>
    <input id="password" type="password" autocomplete="current-password" required>
    <div class="btn-group">
      <button type="submit" class="btn-primary" id="loginBtn" data-i18n="login"></button>
      <button type="button" class="btn-secondary" id="registerBtn" data-i18n="register"></button>
    </div>
  </form>
  <div class="msg error" id="error"></div>
  <div class="msg info" id="info"></div>
</div>
<script>
(function() {
  var i18n = {
    zh: {
      title: '剪贴板同步',
      username: '用户名',
      password: '密码',
      login: '登录',
      register: '注册',
      usernamePlaceholder: '请输入用户名',
      passwordPlaceholder: '请输入密码',
      emptyFields: '请输入用户名和密码',
      loginFailed: '登录失败',
      regFailed: '注册失败',
      registering: '正在注册…',
      regSuccess: '注册成功！正在登录…',
      pageTitle: '剪贴板同步'
    },
    en: {
      title: 'Clipboard Sync',
      username: 'Username',
      password: 'Password',
      login: 'Login',
      register: 'Register',
      usernamePlaceholder: 'Enter your username',
      passwordPlaceholder: 'Enter your password',
      emptyFields: 'Please enter username and password',
      loginFailed: 'Login failed',
      regFailed: 'Registration failed',
      registering: 'Registering…',
      regSuccess: 'Registered! Logging in…',
      pageTitle: 'Clipboard Sync'
    }
  };

  var lang = /^zh/i.test(navigator.language) ? 'zh' : 'en';
  var t = i18n[lang];

  document.title = t.pageTitle;
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t[el.getAttribute('data-i18n')];
  });

  var errorEl = document.getElementById('error');
  var infoEl = document.getElementById('info');
  var form = document.getElementById('form');
  var usernameInput = document.getElementById('username');
  var passwordInput = document.getElementById('password');
  var loginBtn = document.getElementById('loginBtn');
  var registerBtn = document.getElementById('registerBtn');

  usernameInput.placeholder = t.usernamePlaceholder;
  passwordInput.placeholder = t.passwordPlaceholder;

  function showError(msg) {
    infoEl.style.display = 'none';
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }
  function showInfo(msg) {
    errorEl.style.display = 'none';
    infoEl.textContent = msg;
    infoEl.style.display = 'block';
  }
  function setLoading(v) {
    loginBtn.disabled = v;
    registerBtn.disabled = v;
  }

  if (sessionStorage.getItem('token')) {
    window.location.href = 'app.html';
    return;
  }

  var params = new URLSearchParams(window.location.search);
  var autoUser = params.get('user');
  var autoPass = params.get('pass');
  if (autoUser && autoPass) {
    usernameInput.value = autoUser;
    passwordInput.value = autoPass;
    doLogin(autoUser, autoPass);
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    doLogin(usernameInput.value, passwordInput.value);
  });

  registerBtn.addEventListener('click', function() {
    var u = usernameInput.value.trim();
    var p = passwordInput.value.trim();
    if (!u || !p) { showError(t.emptyFields); return; }
    doRegister(u, p);
  });

  function doLogin(username, password) {
    setLoading(true);
    errorEl.style.display = 'none';
    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) throw new Error(res.data.error || t.loginFailed);
      sessionStorage.setItem('token', res.data.token);
      history.replaceState(null, '', window.location.pathname);
      window.location.href = 'app.html';
    })
    .catch(function(e) { showError(e.message); setLoading(false); });
  }

  function doRegister(username, password) {
    setLoading(true);
    showInfo(t.registering);
    fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) throw new Error(res.data.error || t.regFailed);
      showInfo(t.regSuccess);
      doLogin(username, password);
    })
    .catch(function(e) { showError(e.message); setLoading(false); });
  }
})();
</script>
</body>
</html>
