<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-gradient-start: #1a1a1a;
  --bg-gradient-mid: #2a2520;
  --bg-gradient-end: #1c1917;
  --surface: rgba(255, 255, 255, 0.05);
  --surface-hover: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.09);
  --border-light: rgba(255, 255, 255, 0.05);
  --text-primary: #ede9e3;
  --text-secondary: rgba(237, 233, 227, 0.55);
  --text-tertiary: rgba(237, 233, 227, 0.3);
  --accent: #e8a849;
  --accent-hover: #d4952f;
  --accent-glow: rgba(232, 168, 73, 0.25);
  --danger-bg: rgba(220, 80, 70, 0.12);
  --danger-text: #f0a8a3;
  --danger-hover: rgba(220, 80, 70, 0.22);
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6ee7b7;
  --toast-bg: rgba(220, 80, 70, 0.9);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
  background-attachment: fixed;
  min-height: 100vh;
  padding: 1.5rem 1rem;
  color: var(--text-primary);
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -100px;
  right: -80px;
  pointer-events: none;
  animation: float 8s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-25px); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
  from { opacity: 0; transform: translate(-50%, -100%); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

@keyframes clipIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.container {
  max-width: 680px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  animation: fadeInUp .5s ease-out;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: .6rem;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px var(--accent-glow);
  flex-shrink: 0;
}

.logo-icon svg { width: 18px; height: 18px; fill: #fff; }

.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.btn {
  padding: .5rem 1rem;
  border: none;
  border-radius: 9px;
  font-size: .82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .2s, box-shadow .2s, transform .15s;
  color: var(--text-primary);
}

.btn:active { transform: scale(.96); }

.btn-logout {
  background: var(--surface);
  border: 1px solid var(--border);
}
.btn-logout:hover { background: var(--surface-hover); }

.btn-lang {
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: .78rem;
  padding: .4rem .7rem;
}
.btn-lang:hover { background: var(--surface-hover); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 3px 12px var(--accent-glow);
}
.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 5px 20px var(--accent-glow);
}
.btn-primary:disabled {
  opacity: .5;
  cursor: not-allowed;
  box-shadow: none;
}

.btn-sm { padding: .35rem .75rem; font-size: .78rem; }

.btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border-light);
}
.btn-icon:hover { background: var(--surface-hover); }
.btn-icon svg { width: 15px; height: 15px; fill: var(--text-secondary); }

.btn-icon-danger:hover {
  background: var(--danger-bg);
  border-color: rgba(239, 68, 68, 0.2);
}
.btn-icon-danger:hover svg { fill: var(--danger-text); }

/* ── Compose ── */
.compose {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 2rem;
  animation: fadeInUp .55s ease-out;
}

textarea {
  width: 100%;
  min-height: 100px;
  padding: .75rem 1rem;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  font-size: .92rem;
  font-family: inherit;
  color: var(--text-primary);
  resize: vertical;
  margin-bottom: .75rem;
  transition: border-color .25s, box-shadow .25s;
}

textarea::placeholder { color: var(--text-tertiary); }
textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.compose-actions { display: flex; justify-content: flex-end; }

/* ── Clips Section ── */
.clips-section { animation: fadeInUp .6s ease-out; }

.clips-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.clips-header h2 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
}

.clip-list { list-style: none; }

.clip-item {
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 1rem 1.15rem;
  margin-bottom: .6rem;
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  transition: background .2s, border-color .2s;
  animation: clipIn .35s ease-out both;
}

.clip-item:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}

.clip-body { flex: 1; min-width: 0; }

.clip-text {
  font-size: .9rem;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 6.5em;
  overflow: hidden;
  line-height: 1.55;
}

.clip-time {
  font-size: .72rem;
  color: var(--text-tertiary);
  margin-top: .4rem;
  font-weight: 500;
}

.clip-actions {
  flex-shrink: 0;
  display: flex;
  gap: .35rem;
}

.empty {
  text-align: center;
  color: var(--text-tertiary);
  padding: 3rem 1rem;
  font-size: .92rem;
}

.empty-icon {
  display: block;
  margin: 0 auto .75rem;
  width: 48px;
  height: 48px;
  opacity: .3;
}

/* ── QR login (App) ── */
.qr-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.15rem;
  margin-bottom: 1.25rem;
  animation: fadeInUp .5s ease-out .1s both;
}
.qr-panel h3 {
  font-size: .92rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: .35rem;
}
.qr-panel .qr-hint {
  font-size: .78rem;
  color: var(--text-tertiary);
  line-height: 1.45;
  margin-bottom: .85rem;
}
.qr-panel .qr-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1rem;
}
.qr-panel canvas {
  display: block;
  border-radius: 8px;
  background: #fff;
  padding: 6px;
}

/* ── Toast ── */
.toast {
  position: fixed;
  top: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  padding: .65rem 1.25rem;
  border-radius: 10px;
  font-size: .84rem;
  font-weight: 500;
  font-family: inherit;
  z-index: 200;
  pointer-events: none;
  display: none;
  animation: slideDown .3s ease-out;
}

.toast-error { background: var(--toast-bg); color: #fff; backdrop-filter: blur(12px); }
.toast-success { background: var(--success-bg); color: var(--success-text); backdrop-filter: blur(12px); border: 1px solid rgba(52, 211, 153, 0.2); }

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 1rem .75rem; }
  .compose { padding: 1rem; }
  .clip-item { padding: .85rem 1rem; }
}
</style>
</head>
<body>
<div class="toast toast-error" id="toast"></div>
<div class="toast toast-success" id="toastSuccess"></div>
<div class="container">
  <div class="header">
    <div class="header-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
      </div>
      <h1 data-i18n="title"></h1>
    </div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-lang" id="langSwitch"></button>
      <button class="btn btn-logout" id="logoutBtn" data-i18n="logout"></button>
    </div>
  </div>
  <div class="qr-panel" id="qrPanel">
    <h3 data-i18n="qrTitle"></h3>
    <p class="qr-hint" data-i18n="qrHint"></p>
    <div class="qr-row">
      <canvas id="qrCanvas" width="200" height="200" aria-label="App login QR"></canvas>
      <button type="button" class="btn btn-sm btn-primary" id="qrRefreshBtn" data-i18n="qrRefresh"></button>
    </div>
  </div>
  <div class="compose">
    <textarea id="clipText"></textarea>
    <div class="compose-actions">
      <button class="btn btn-primary" id="submitBtn" data-i18n="submit"></button>
    </div>
  </div>
  <div class="clips-section">
    <div class="clips-header">
      <h2 data-i18n="yourClips"></h2>
      <button class="btn btn-sm btn-logout" id="refreshBtn" data-i18n="refresh"></button>
    </div>
    <ul class="clip-list" id="clipList"></ul>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
(function() {
  var i18n = {
    zh: {
      title: '剪贴板同步',
      logout: '退出',
      placeholder: '粘贴或输入要同步的内容…',
      submit: '提交',
      yourClips: '我的剪贴',
      refresh: '刷新',
      emptyText: '暂无剪贴内容，在上方添加一条吧！',
      copied: '已复制！',
      copyTitle: '复制',
      deleteTitle: '删除',
      sessionExpired: '会话已过期',
      requestFailed: '请求失败',
      justNow: '刚刚',
      mAgo: '分钟前',
      hAgo: '小时前',
      pageTitle: '剪贴板同步',
      qrTitle: 'App 扫码登录',
      qrHint: '需先在登录页用账号密码登录一次（用于确认身份），再在本页生成码。二维码仅含一次性令牌与服务器地址，不含密码。请在 App 登录页扫码。',
      qrRefresh: '刷新二维码',
      qrLibMissing: '二维码库加载失败，请刷新页面',
      qrGenFail: '生成二维码失败'
    },
    en: {
      title: 'Clipboard Sync',
      logout: 'Logout',
      placeholder: 'Paste or type something to sync…',
      submit: 'Submit',
      yourClips: 'Your Clips',
      refresh: 'Refresh',
      emptyText: 'No clips yet. Add one above!',
      copied: 'Copied!',
      copyTitle: 'Copy',
      deleteTitle: 'Delete',
      sessionExpired: 'Session expired',
      requestFailed: 'Request failed',
      justNow: 'Just now',
      mAgo: 'm ago',
      hAgo: 'h ago',
      pageTitle: 'Clipboard Sync',
      qrTitle: 'Sign in with the app',
      qrHint: 'Sign in with username and password on the login page first (proves it is you), then generate the code here. The QR contains only a one-time token and server URL, not your password. Scan from the app login screen.',
      qrRefresh: 'Refresh QR',
      qrLibMissing: 'QR library failed to load. Reload the page.',
      qrGenFail: 'Could not generate QR code'
    }
  };

  var savedLang = localStorage.getItem('lang');
  var lang = savedLang || (/^zh/i.test(navigator.language) ? 'zh' : 'en');
  var t = i18n[lang];

  var langSwitch = document.getElementById('langSwitch');

  function applyLang() {
    t = i18n[lang];
    document.title = t.pageTitle;
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      el.textContent = t[el.getAttribute('data-i18n')];
    });
    langSwitch.textContent = lang === 'zh' ? 'EN' : '中文';
    if (clipText) clipText.placeholder = t.placeholder;
  }

  langSwitch.addEventListener('click', function() {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', lang);
    applyLang();
    loadClips();
  });

  var token = sessionStorage.getItem('token');
  if (!token) { window.location.href = 'index.html'; return; }

  var toast = document.getElementById('toast');
  var toastSuccess = document.getElementById('toastSuccess');
  var clipText = document.getElementById('clipText');
  var submitBtn = document.getElementById('submitBtn');
  var refreshBtn = document.getElementById('refreshBtn');
  var logoutBtn = document.getElementById('logoutBtn');
  var clipList = document.getElementById('clipList');
  var toastTimer = null;

  applyLang();

  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.style.display = 'block';
    toastTimer = setTimeout(function() { toast.style.display = 'none'; }, 3000);
  }

  function showSuccess(msg) {
    clearTimeout(toastTimer);
    toastSuccess.textContent = msg;
    toastSuccess.style.display = 'block';
    toastTimer = setTimeout(function() { toastSuccess.style.display = 'none'; }, 2000);
  }

  function api(method, path, body) {
    var opts = {
      method: method,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(path, opts).then(function(r) {
      if (r.status === 401) {
        sessionStorage.removeItem('token');
        window.location.href = 'index.html';
        throw new Error(t.sessionExpired);
      }
      return r.json().then(function(d) {
        if (!r.ok) throw new Error(d.error || t.requestFailed);
        return d;
      });
    });
  }

  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return t.justNow;
    if (diff < 3600000) return Math.floor(diff / 60000) + (lang === 'zh' ? ' ' : '') + t.mAgo;
    if (diff < 86400000) return Math.floor(diff / 3600000) + (lang === 'zh' ? ' ' : '') + t.hAgo;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function truncate(text, len) {
    return text.length > len ? text.substring(0, len) + '…' : text;
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showSuccess(t.copied);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showSuccess(t.copied);
    }
  }

  function renderClips(clips) {
    if (!clips.length) {
      clipList.innerHTML =
        '<li class="empty">' +
          '<svg class="empty-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>' +
          t.emptyText +
        '</li>';
      return;
    }
    clipList.innerHTML = '';
    clips.forEach(function(clip, i) {
      var li = document.createElement('li');
      li.className = 'clip-item';
      li.style.animationDelay = (i * 0.05) + 's';
      li.innerHTML =
        '<div class="clip-body">' +
          '<div class="clip-text"></div>' +
          '<div class="clip-time">' + formatTime(clip.createdAt) + '</div>' +
        '</div>' +
        '<div class="clip-actions">' +
          '<button class="btn btn-icon" data-copy title="' + t.copyTitle + '">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>' +
          '</button>' +
          '<button class="btn btn-icon btn-icon-danger" data-id="' + clip.id + '" title="' + t.deleteTitle + '">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/></svg>' +
          '</button>' +
        '</div>';
      li.querySelector('.clip-text').textContent = truncate(clip.text, 500);
      li._fullText = clip.text;
      clipList.appendChild(li);
    });
  }

  function loadClips() {
    api('GET', '/api/clips').then(function(d) { renderClips(d.clips); })
      .catch(function(e) { showToast(e.message); });
  }

  submitBtn.addEventListener('click', function() {
    var text = clipText.value.trim();
    if (!text) return;
    submitBtn.disabled = true;
    api('POST', '/api/clips', { text: text }).then(function() {
      clipText.value = '';
      loadClips();
    }).catch(function(e) { showToast(e.message); })
      .finally(function() { submitBtn.disabled = false; });
  });

  clipList.addEventListener('click', function(e) {
    var copyBtn = e.target.closest('[data-copy]');
    if (copyBtn) {
      var item = copyBtn.closest('.clip-item');
      if (item && item._fullText) copyToClipboard(item._fullText);
      return;
    }
    var delBtn = e.target.closest('[data-id]');
    if (!delBtn) return;
    var id = delBtn.getAttribute('data-id');
    delBtn.disabled = true;
    api('DELETE', '/api/clips/' + id).then(function() { loadClips(); })
      .catch(function(e) { showToast(e.message); });
  });

  refreshBtn.addEventListener('click', loadClips);

  logoutBtn.addEventListener('click', function() {
    sessionStorage.removeItem('token');
    window.location.href = 'index.html';
  });

  function buildQrPayload(code) {
    var baseUrl = window.location.origin + '/';
    return JSON.stringify({ v: 1, u: baseUrl, c: code });
  }

  function drawQr(code) {
    var canvas = document.getElementById('qrCanvas');
    if (typeof QRCode === 'undefined') {
      showToast(t.qrLibMissing);
      return;
    }
    var payload = buildQrPayload(code);
    QRCode.toCanvas(
      canvas,
      payload,
      { width: 200, margin: 1, color: { dark: '#1a1a1a', light: '#ffffff' } },
      function(err) {
        if (err) showToast(err.message || t.qrGenFail);
      }
    );
  }

  function refreshQrSession() {
    var btn = document.getElementById('qrRefreshBtn');
    if (btn) btn.disabled = true;
    api('POST', '/api/auth/qr-session', {})
      .then(function(d) {
        drawQr(d.code);
      })
      .catch(function(e) {
        showToast(e.message);
      })
      .finally(function() {
        if (btn) btn.disabled = false;
      });
  }

  document.getElementById('qrRefreshBtn').addEventListener('click', refreshQrSession);

  loadClips();
  refreshQrSession();
  setInterval(loadClips, 30000);
})();
</script>
</body>
</html>
