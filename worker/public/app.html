<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-gradient-start: #1a1a1a;
  --bg-gradient-mid: #2a2520;
  --bg-gradient-end: #1c1917;
  --surface: rgba(255, 255, 255, 0.05);
  --surface-hover: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.09);
  --border-light: rgba(255, 255, 255, 0.05);
  --text-primary: #ede9e3;
  --text-secondary: rgba(237, 233, 227, 0.55);
  --text-tertiary: rgba(237, 233, 227, 0.3);
  --accent: #e8a849;
  --accent-hover: #d4952f;
  --accent-glow: rgba(232, 168, 73, 0.25);
  --danger-bg: rgba(220, 80, 70, 0.12);
  --danger-text: #f0a8a3;
  --danger-hover: rgba(220, 80, 70, 0.22);
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6ee7b7;
  --toast-bg: rgba(220, 80, 70, 0.9);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
  background-attachment: fixed;
  min-height: 100vh;
  padding: 1.5rem 1rem;
  color: var(--text-primary);
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -100px;
  right: -80px;
  pointer-events: none;
  animation: float 8s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-25px); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
  from { opacity: 0; transform: translate(-50%, -100%); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

@keyframes clipIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.container {
  max-width: 680px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  animation: fadeInUp .5s ease-out;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: .6rem;
}

.header-copy {
  display: flex;
  flex-direction: column;
  gap: .2rem;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px var(--accent-glow);
  flex-shrink: 0;
}

.logo-icon svg { width: 18px; height: 18px; fill: #fff; }

.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.current-user {
  font-size: .8rem;
  color: var(--text-secondary);
  line-height: 1.3;
}

.btn {
  padding: .5rem 1rem;
  border: none;
  border-radius: 9px;
  font-size: .82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .2s, box-shadow .2s, transform .15s;
  color: var(--text-primary);
}

.btn:active { transform: scale(.96); }

.btn-logout {
  background: var(--surface);
  border: 1px solid var(--border);
}
.btn-logout:hover { background: var(--surface-hover); }

.btn-lang {
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: .78rem;
  padding: .4rem .7rem;
}
.btn-lang:hover { background: var(--surface-hover); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 3px 12px var(--accent-glow);
}
.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 5px 20px var(--accent-glow);
}
.btn-primary:disabled {
  opacity: .5;
  cursor: not-allowed;
  box-shadow: none;
}

.btn-sm { padding: .35rem .75rem; font-size: .78rem; }

.btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border-light);
}
.btn-icon:hover { background: var(--surface-hover); }
.btn-icon svg { width: 15px; height: 15px; fill: var(--text-secondary); }

.btn-icon-danger:hover {
  background: var(--danger-bg);
  border-color: rgba(239, 68, 68, 0.2);
}
.btn-icon-danger:hover svg { fill: var(--danger-text); }

/* ── Compose ── */
.compose {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 2rem;
  animation: fadeInUp .55s ease-out;
}

textarea {
  width: 100%;
  min-height: 100px;
  padding: .75rem 1rem;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  font-size: .92rem;
  font-family: inherit;
  color: var(--text-primary);
  resize: vertical;
  margin-bottom: .75rem;
  transition: border-color .25s, box-shadow .25s;
}

textarea::placeholder { color: var(--text-tertiary); }
textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.compose-actions { display: flex; justify-content: flex-end; }

.sync-delay-hint {
  font-size: .78rem;
  line-height: 1.45;
  color: var(--text-tertiary);
  margin: 0 0 1.25rem;
  padding: 0 .15rem;
}

/* ── Clips Section ── */
.clips-section { animation: fadeInUp .6s ease-out; }

.clips-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.clips-header h2 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
}

.clip-list { list-style: none; }

.clip-item {
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 1rem 1.15rem;
  margin-bottom: .6rem;
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  transition: background .2s, border-color .2s;
  animation: clipIn .35s ease-out both;
}

.clip-item:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}

.clip-body { flex: 1; min-width: 0; }

.clip-text {
  font-size: .9rem;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 6.5em;
  overflow: hidden;
  line-height: 1.55;
}

.clip-time {
  font-size: .72rem;
  color: var(--text-tertiary);
  margin-top: .4rem;
  font-weight: 500;
}

.clip-actions {
  flex-shrink: 0;
  display: flex;
  gap: .35rem;
}

.empty {
  text-align: center;
  color: var(--text-tertiary);
  padding: 3rem 1rem;
  font-size: .92rem;
}

.empty-icon {
  display: block;
  margin: 0 auto .75rem;
  width: 48px;
  height: 48px;
  opacity: .3;
}

/* ── QR modal (App login) ── */
.qr-open-btn svg {
  width: 18px;
  height: 18px;
  fill: var(--text-secondary);
}
.qr-open-btn:hover svg { fill: var(--text-primary); }

.qr-modal {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  box-sizing: border-box;
}
.qr-modal.is-open { display: flex; }

.qr-modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.qr-modal-sheet {
  position: relative;
  z-index: 1;
  max-width: 360px;
  width: 100%;
  background: linear-gradient(145deg, rgba(35, 32, 28, 0.98), rgba(28, 25, 22, 0.99));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.35rem 1.1rem;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
  animation: fadeInUp .28s ease-out;
}

.qr-modal-sheet h3 {
  font-size: .95rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: .4rem;
  padding-right: 2rem;
}
.qr-modal-sheet .qr-hint {
  font-size: .78rem;
  color: var(--text-tertiary);
  line-height: 1.45;
  margin-bottom: 1rem;
}
.qr-modal-close {
  position: absolute;
  top: .65rem;
  right: .65rem;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 1.35rem;
  line-height: 1;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-modal-close:hover { background: var(--surface-hover); color: var(--text-primary); }

.qr-modal .qr-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1rem;
}
.qr-mount {
  min-width: 200px;
  min-height: 200px;
  border-radius: 10px;
  background: #fff;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-mount table { margin: 0 auto; }

/* ── Toast ── */
.toast {
  position: fixed;
  top: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  padding: .65rem 1.25rem;
  border-radius: 10px;
  font-size: .84rem;
  font-weight: 500;
  font-family: inherit;
  z-index: 200;
  pointer-events: none;
  display: none;
  animation: slideDown .3s ease-out;
}

.toast-error { background: var(--toast-bg); color: #fff; backdrop-filter: blur(12px); }
.toast-success { background: var(--success-bg); color: var(--success-text); backdrop-filter: blur(12px); border: 1px solid rgba(52, 211, 153, 0.2); }

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 1rem .75rem; }
  .compose { padding: 1rem; }
  .clip-item { padding: .85rem 1rem; }
}
</style>
</head>
<body>
<div class="toast toast-error" id="toast"></div>
<div class="toast toast-success" id="toastSuccess"></div>
<div class="container">
  <div class="header">
    <div class="header-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
      </div>
      <div class="header-copy">
        <h1 data-i18n="title"></h1>
        <div class="current-user" id="currentUser"></div>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <button type="button" class="btn btn-icon qr-open-btn" id="qrOpenBtn" data-i18n-title="qrOpenTitle" aria-label="QR">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 3h6v6H3V3zm2 2v2h2V5H5zm8-2h6v6h-6V3zm2 2v2h2V5h-2zM3 15h6v6H3v-6zm2 2v2h2v-2H5zm13-2h1v1h-1v-1zm-4 0h2v1h-2v-1zm4 3h1v1h-1v-1zm0-3h1v1h-1v-1zm-1-1h1v1h-1v-1zm-4 3h2v2h-2v-2zm3 0h1v2h-1v-2zm1-1h2v1h-2v-1zm-4-2h2v2h-2v-2zm4 0h2v2h-2v-2zm2-1h1v1h-1v-1z"/></svg>
      </button>
      <button class="btn btn-lang" id="langSwitch"></button>
      <button class="btn btn-logout" id="logoutBtn" data-i18n="logout"></button>
    </div>
  </div>
  <div class="compose">
    <textarea id="clipText"></textarea>
    <div class="compose-actions">
      <button class="btn btn-primary" id="submitBtn" data-i18n="submit"></button>
    </div>
  </div>
  <p class="sync-delay-hint" data-i18n="syncDelayHint"></p>
  <div class="clips-section">
    <div class="clips-header">
      <h2 data-i18n="yourClips"></h2>
      <button class="btn btn-sm btn-logout" id="refreshBtn" data-i18n="refresh"></button>
    </div>
    <ul class="clip-list" id="clipList"></ul>
  </div>
</div>

<div class="qr-modal" id="qrModal" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle">
  <div class="qr-modal-backdrop" id="qrModalBackdrop"></div>
  <div class="qr-modal-sheet">
    <button type="button" class="qr-modal-close" id="qrModalClose" aria-label="Close">&times;</button>
    <h3 id="qrModalTitle" data-i18n="qrTitle"></h3>
    <p class="qr-hint" data-i18n="qrHint"></p>
    <div class="qr-row">
      <div id="qrMount" class="qr-mount"></div>
      <button type="button" class="btn btn-sm btn-primary" id="qrRefreshBtn" data-i18n="qrRefresh"></button>
    </div>
  </div>
</div>

<script>
(function() {
  var i18n = {
    zh: {
      title: '剪贴板同步',
      logout: '退出',
      placeholder: '粘贴或输入要同步的内容…',
      submit: '提交',
      yourClips: '我的剪贴',
      refresh: '刷新',
      emptyText: '暂无剪贴内容，在上方添加一条吧！',
      copied: '已复制！',
      copyTitle: '复制',
      deleteTitle: '删除',
      sessionExpired: '会话已过期',
      requestFailed: '请求失败',
      justNow: '刚刚',
      mAgo: '分钟前',
      hAgo: '小时前',
      pageTitle: '剪贴板同步',
      qrTitle: 'App 扫码登录',
      qrHint: '需先在登录页用账号密码登录一次（用于确认身份），再在本页生成码。二维码仅含一次性令牌与服务器地址，不含密码。请在 App 登录页扫码。',
      qrRefresh: '刷新二维码',
      qrOpenTitle: 'App 扫码登录',
      qrLibMissing: '二维码库加载失败，请检查网络或稍后重试',
      qrGenFail: '生成二维码失败',
      currentUser: '当前用户',
      currentUserLoading: '读取中…',
      currentUserUnknown: '未知',
      syncDelayHint: '提示：在本页新增或删除剪贴后，手机等其它设备上的列表可能不会立刻更新，请稍候再刷新。',
      syncDelayToast: '已提交。其它终端可能要稍后才能看到变化。'
    },
    en: {
      title: 'Clipboard Sync',
      logout: 'Logout',
      placeholder: 'Paste or type something to sync…',
      submit: 'Submit',
      yourClips: 'Your Clips',
      refresh: 'Refresh',
      emptyText: 'No clips yet. Add one above!',
      copied: 'Copied!',
      copyTitle: 'Copy',
      deleteTitle: 'Delete',
      sessionExpired: 'Session expired',
      requestFailed: 'Request failed',
      justNow: 'Just now',
      mAgo: 'm ago',
      hAgo: 'h ago',
      pageTitle: 'Clipboard Sync',
      qrTitle: 'Sign in with the app',
      qrHint: 'Sign in with username and password on the login page first (proves it is you), then generate the code here. The QR contains only a one-time token and server URL, not your password. Scan from the app login screen.',
      qrRefresh: 'Refresh QR',
      qrOpenTitle: 'App QR sign-in',
      qrLibMissing: 'Could not load QR library. Check your network and try again.',
      qrGenFail: 'Could not generate QR code',
      currentUser: 'Current user',
      currentUserLoading: 'Loading…',
      currentUserUnknown: 'Unknown',
      syncDelayHint: 'Note: After you add or remove a clip here, other devices may not update immediately. Try refreshing again shortly.',
      syncDelayToast: 'Done. Other devices may take a moment to show this change.'
    }
  };

  var savedLang = localStorage.getItem('lang');
  var lang = savedLang || (/^zh/i.test(navigator.language) ? 'zh' : 'en');
  var t = i18n[lang];

  var langSwitch = document.getElementById('langSwitch');

  function applyLang() {
    t = i18n[lang];
    document.title = t.pageTitle;
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      el.textContent = t[el.getAttribute('data-i18n')];
    });
    document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
      var k = el.getAttribute('data-i18n-title');
      if (t[k]) {
        el.setAttribute('title', t[k]);
        el.setAttribute('aria-label', t[k]);
      }
    });
    langSwitch.textContent = lang === 'zh' ? 'EN' : '中文';
    if (clipText) clipText.placeholder = t.placeholder;
    renderCurrentUser();
  }

  langSwitch.addEventListener('click', function() {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', lang);
    applyLang();
    loadClips();
  });

  var token = sessionStorage.getItem('token');
  if (!token) { window.location.href = 'index.html'; return; }

  var toast = document.getElementById('toast');
  var toastSuccess = document.getElementById('toastSuccess');
  var clipText = document.getElementById('clipText');
  var submitBtn = document.getElementById('submitBtn');
  var refreshBtn = document.getElementById('refreshBtn');
  var logoutBtn = document.getElementById('logoutBtn');
  var clipList = document.getElementById('clipList');
  var currentUserEl = document.getElementById('currentUser');
  var toastTimer = null;
  var currentUsername = sessionStorage.getItem('username') || '';

  applyLang();

  function renderCurrentUser() {
    if (!currentUserEl) return;
    var value = currentUsername || t.currentUserLoading;
    currentUserEl.textContent = t.currentUser + ': ' + value;
  }

  renderCurrentUser();

  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.style.display = 'block';
    toastTimer = setTimeout(function() { toast.style.display = 'none'; }, 3000);
  }

  function showSuccess(msg, durationMs) {
    var ms = typeof durationMs === 'number' ? durationMs : 2000;
    clearTimeout(toastTimer);
    toastSuccess.textContent = msg;
    toastSuccess.style.display = 'block';
    toastTimer = setTimeout(function() { toastSuccess.style.display = 'none'; }, ms);
  }

  function api(method, path, body) {
    var opts = {
      method: method,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(path, opts).then(function(r) {
      if (r.status === 401) {
        sessionStorage.removeItem('token');
        window.location.href = 'index.html';
        throw new Error(t.sessionExpired);
      }
      return r.json().then(function(d) {
        if (!r.ok) throw new Error(d.error || t.requestFailed);
        return d;
      });
    });
  }

  function formatTime(iso) {
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return t.justNow;
    if (diff < 3600000) return Math.floor(diff / 60000) + (lang === 'zh' ? ' ' : '') + t.mAgo;
    if (diff < 86400000) return Math.floor(diff / 3600000) + (lang === 'zh' ? ' ' : '') + t.hAgo;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function truncate(text, len) {
    return text.length > len ? text.substring(0, len) + '…' : text;
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showSuccess(t.copied);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showSuccess(t.copied);
    }
  }

  function renderClips(clips) {
    if (!clips.length) {
      clipList.innerHTML =
        '<li class="empty">' +
          '<svg class="empty-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>' +
          t.emptyText +
        '</li>';
      return;
    }
    clipList.innerHTML = '';
    clips.forEach(function(clip, i) {
      var li = document.createElement('li');
      li.className = 'clip-item';
      li.style.animationDelay = (i * 0.05) + 's';
      li.innerHTML =
        '<div class="clip-body">' +
          '<div class="clip-text"></div>' +
          '<div class="clip-time">' + formatTime(clip.createdAt) + '</div>' +
        '</div>' +
        '<div class="clip-actions">' +
          '<button class="btn btn-icon" data-copy title="' + t.copyTitle + '">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>' +
          '</button>' +
          '<button class="btn btn-icon btn-icon-danger" data-id="' + clip.id + '" title="' + t.deleteTitle + '">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/></svg>' +
          '</button>' +
        '</div>';
      li.querySelector('.clip-text').textContent = truncate(clip.text, 500);
      li._fullText = clip.text;
      clipList.appendChild(li);
    });
  }

  function loadClips() {
    api('GET', '/api/clips').then(function(d) { renderClips(d.clips); })
      .catch(function(e) { showToast(e.message); });
  }

  function loadCurrentUser() {
    api('GET', '/api/me').then(function(d) {
      currentUsername = d.username || t.currentUserUnknown;
      sessionStorage.setItem('username', currentUsername);
      renderCurrentUser();
    }).catch(function() {
      currentUsername = currentUsername || t.currentUserUnknown;
      renderCurrentUser();
    });
  }

  submitBtn.addEventListener('click', function() {
    var text = clipText.value.trim();
    if (!text) return;
    submitBtn.disabled = true;
    api('POST', '/api/clips', { text: text }).then(function() {
      clipText.value = '';
      loadClips();
      showSuccess(t.syncDelayToast, 4500);
    }).catch(function(e) { showToast(e.message); })
      .finally(function() { submitBtn.disabled = false; });
  });

  clipList.addEventListener('click', function(e) {
    var copyBtn = e.target.closest('[data-copy]');
    if (copyBtn) {
      var item = copyBtn.closest('.clip-item');
      if (item && item._fullText) copyToClipboard(item._fullText);
      return;
    }
    var delBtn = e.target.closest('[data-id]');
    if (!delBtn) return;
    var id = delBtn.getAttribute('data-id');
    delBtn.disabled = true;
    api('DELETE', '/api/clips/' + id).then(function() {
      loadClips();
      showSuccess(t.syncDelayToast, 4500);
    })
      .catch(function(e) { showToast(e.message); })
      .finally(function() { delBtn.disabled = false; });
  });

  refreshBtn.addEventListener('click', loadClips);

  logoutBtn.addEventListener('click', function() {
    sessionStorage.removeItem('token');
    sessionStorage.removeItem('username');
    window.location.href = 'index.html';
  });

  var qrScriptPromise = null;

  function ensureQrLib() {
    if (typeof QRCode !== 'undefined') return Promise.resolve();
    if (qrScriptPromise) return qrScriptPromise;
    qrScriptPromise = new Promise(function(resolve, reject) {
      var urls = [
        window.location.origin + '/qrcodejs.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'
      ];
      var i = 0;
      function tryNext() {
        if (typeof QRCode !== 'undefined') {
          resolve();
          return;
        }
        if (i >= urls.length) {
          reject(new Error('qr-lib'));
          return;
        }
        var s = document.createElement('script');
        s.async = true;
        s.src = urls[i++];
        s.onload = function() {
          if (typeof QRCode !== 'undefined') resolve();
          else tryNext();
        };
        s.onerror = function() {
          tryNext();
        };
        document.head.appendChild(s);
      }
      tryNext();
    });
    return qrScriptPromise;
  }

  function buildQrPayload(code) {
    var baseUrl = window.location.origin + '/';
    return JSON.stringify({ v: 1, u: baseUrl, c: code });
  }

  function drawQr(code) {
    var mount = document.getElementById('qrMount');
    if (!mount) return;
    mount.innerHTML = '';
    var payload = buildQrPayload(code);
    try {
      new QRCode(mount, {
        text: payload,
        width: 200,
        height: 200,
        colorDark: '#1a1a1a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch (e) {
      showToast(e.message || t.qrGenFail);
    }
  }

  function refreshQrSession() {
    var btn = document.getElementById('qrRefreshBtn');
    if (btn) btn.disabled = true;
    ensureQrLib()
      .then(function() {
        return api('POST', '/api/auth/qr-session', {});
      })
      .then(function(d) {
        drawQr(d.code);
      })
      .catch(function(e) {
        if (e && e.message === 'qr-lib') showToast(t.qrLibMissing);
        else showToast(e.message || t.qrLibMissing);
      })
      .finally(function() {
        if (btn) btn.disabled = false;
      });
  }

  var qrModal = document.getElementById('qrModal');
  var qrOpenBtn = document.getElementById('qrOpenBtn');

  function openQrModal() {
    qrModal.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    refreshQrSession();
  }

  function closeQrModal() {
    qrModal.classList.remove('is-open');
    document.body.style.overflow = '';
  }

  qrOpenBtn.addEventListener('click', openQrModal);
  document.getElementById('qrModalClose').addEventListener('click', closeQrModal);
  document.getElementById('qrModalBackdrop').addEventListener('click', closeQrModal);
  document.getElementById('qrRefreshBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    refreshQrSession();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && qrModal.classList.contains('is-open')) closeQrModal();
  });

  loadCurrentUser();
  loadClips();
  setInterval(loadClips, 30000);
})();
</script>
</body>
</html>
