name: Update Changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: update-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        shell: bash
        run: git cliff --config cliff.toml --output CHANGELOG.md

      - name: Commit updated changelog
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          cp CHANGELOG.md "$RUNNER_TEMP/CHANGELOG.md"
          git checkout "$DEFAULT_BRANCH"
          cp "$RUNNER_TEMP/CHANGELOG.md" CHANGELOG.md
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${VERSION_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
