name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true

permissions:
  contents: write
  actions: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version_tag="${{ inputs.version_tag }}"
          else
            version_tag="${GITHUB_REF_NAME}"
          fi
          echo "VERSION_TAG=${version_tag}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${version_tag#v}" >> "$GITHUB_ENV"

      - name: Decode Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release artifacts
        working-directory: android
        env:
          VERSION_NAME: ${{ env.VERSION_NAME }}
          CI_RELEASE: "true"
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.VERSION_NAME }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          target_commitish: ${{ github.sha }}
          name: Android ${{ env.VERSION_NAME }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
