name: Release Android

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true
  workflow_call:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare release metadata
        shell: bash
        run: |
          version_tag="${{ inputs.version_tag }}"
          echo "VERSION_TAG=${version_tag}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${version_tag#v}" >> "$GITHUB_ENV"
          echo "ANDROID_ARCHIVE=$RUNNER_TEMP/android-${version_tag}.zip" >> "$GITHUB_ENV"

      - name: Decode Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release artifacts
        working-directory: android
        env:
          VERSION_NAME: ${{ env.VERSION_NAME }}
          CI_RELEASE: "true"
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

      - name: Package Android artifacts
        shell: bash
        run: |
          zip -j "$ANDROID_ARCHIVE" \
            android/app/build/outputs/apk/release/*.apk \
            android/app/build/outputs/bundle/release/*.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.VERSION_TAG }}
          path: ${{ env.ANDROID_ARCHIVE }}
          retention-days: 30
