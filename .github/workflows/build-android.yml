name: Release Android

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true
      build_mode:
        description: 'Build mode'
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
  workflow_call:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string
      build_mode:
        description: 'Build mode'
        required: false
        default: release
        type: string

permissions:
  contents: read

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare release metadata
        shell: bash
        run: |
          version_tag="${{ inputs.version_tag }}"
          build_mode="${{ inputs.build_mode || 'release' }}"
          if [ "$build_mode" != "release" ] && [ "$build_mode" != "debug" ]; then
            echo "Unsupported build mode: $build_mode" >&2
            exit 1
          fi
          echo "VERSION_TAG=${version_tag}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${version_tag#v}" >> "$GITHUB_ENV"
          echo "BUILD_MODE=${build_mode}" >> "$GITHUB_ENV"
          if [ "$build_mode" = "debug" ]; then
            echo "APK_TASK=assembleDebug" >> "$GITHUB_ENV"
            echo "APK_OUTPUT_DIR=android/app/build/outputs/apk/debug" >> "$GITHUB_ENV"
            echo "ANDROID_APK=$RUNNER_TEMP/clipboard-sync-${version_tag#v}-debug.apk" >> "$GITHUB_ENV"
          else
            echo "APK_TASK=assembleRelease" >> "$GITHUB_ENV"
            echo "APK_OUTPUT_DIR=android/app/build/outputs/apk/release" >> "$GITHUB_ENV"
            echo "ANDROID_APK=$RUNNER_TEMP/clipboard-sync-${version_tag#v}.apk" >> "$GITHUB_ENV"
          fi

      - name: Decode Android signing keystore
        if: env.BUILD_MODE == 'release'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release artifacts
        working-directory: android
        env:
          VERSION_NAME: ${{ env.VERSION_NAME }}
          CI_RELEASE: ${{ env.BUILD_MODE == 'release' && 'true' || 'false' }}
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew clean "$APK_TASK" --no-daemon

      - name: Rename Android APK
        shell: bash
        run: |
          cp "$APK_OUTPUT_DIR"/*.apk "$ANDROID_APK"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.VERSION_TAG }}
          path: ${{ env.ANDROID_APK }}
          retention-days: 30
