name: Release Android

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare release metadata
        shell: bash
        run: |
          echo "VERSION_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Decode Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release artifacts
        working-directory: android
        env:
          VERSION_NAME: ${{ env.VERSION_NAME }}
          CI_RELEASE: "true"
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

      - uses: taiki-e/install-action@git-cliff

      - name: Generate changelog and release notes
        shell: bash
        run: |
          git cliff --config cliff.toml --output CHANGELOG.md
          git cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.VERSION_NAME }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            CHANGELOG.md
          retention-days: 30

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Android ${{ env.VERSION_NAME }}
          body_path: RELEASE_NOTES.md
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            CHANGELOG.md

      - name: Commit updated changelog
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cp CHANGELOG.md "$RUNNER_TEMP/CHANGELOG.md"
          git checkout "$DEFAULT_BRANCH"
          cp "$RUNNER_TEMP/CHANGELOG.md" CHANGELOG.md
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${VERSION_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
