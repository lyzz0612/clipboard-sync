name: Deploy Worker

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional version tag, for example v1.0.0'
        required: false
  workflow_call:
    inputs:
      version_tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        shell: bash
        run: |
          version_tag="${{ inputs.version_tag }}"
          if [ -n "$version_tag" ]; then
            echo "VERSION_TAG=${version_tag}" >> "$GITHUB_ENV"
            echo "WORKER_ARCHIVE=$RUNNER_TEMP/worker-${version_tag}.zip" >> "$GITHUB_ENV"
          else
            echo "VERSION_TAG=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
            echo "WORKER_ARCHIVE=$RUNNER_TEMP/worker-manual-${GITHUB_RUN_NUMBER}.zip" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Inject KV namespace ID
        run: sed -i 's|\${KV_NAMESPACE_ID}|${{ secrets.KV_NAMESPACE_ID }}|g' wrangler.toml

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Package worker source
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          git archive --format=zip --output "$WORKER_ARCHIVE" \
            --prefix "worker-${VERSION_TAG}/" HEAD:worker

      - uses: actions/upload-artifact@v4
        with:
          name: worker-source-${{ env.VERSION_TAG }}
          path: ${{ env.WORKER_ARCHIVE }}
          retention-days: 30

